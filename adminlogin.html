<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Aura Events</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c9a96e;--gold-d:#9a7a45;
  --black:#080808;--dark:#0e0e0e;--d2:#151515;
  --white:#fff;--gray:#777;
  --font-d:'Bebas Neue',sans-serif;
  --font-s:'Cormorant Garamond',serif;
  --font-b:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font-b);}

body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background: radial-gradient(ellipse at center, #1a1208 0%, #080808 70%);
}

.login-box{
  width:380px;
  background:var(--d2);
  border:1px solid rgba(201,169,110,0.2);
  padding:40px 36px;
  position:relative;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.logo{
  text-align:center;
  margin-bottom:32px;
}

.logo-star{
  color:var(--gold);font-size:20px;
  animation:spin 8s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

.logo-txt{
  font-family:var(--font-d);font-size:22px;
  letter-spacing:.15em;margin-top:8px;
}

.logo-sub{
  font-family:var(--font-s);font-style:italic;
  color:var(--gold);font-size:14px;margin-top:2px;
}

.login-title{
  font-family:var(--font-s);font-size:1.4rem;
  font-weight:300;color:rgba(255,255,255,0.8);
  margin-bottom:24px;text-align:center;
}

.form-group{
  margin-bottom:16px;
}

.form-group label{
  display:block;font-size:10px;
  text-transform:uppercase;letter-spacing:.12em;
  color:var(--gray);margin-bottom:6px;
}

.form-group input{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--white);
  padding:12px 16px;
  font-family:var(--font-b);
  font-size:14px;
  outline:none;
  transition:border 0.2s;
}

.form-group input:focus{
  border-color:rgba(201,169,110,0.5);
  background:rgba(201,169,110,0.05);
}

.form-group input::placeholder{color:rgba(255,255,255,0.2);}

.login-btn{
  width:100%;
  background:var(--gold);
  border:none;
  color:#000;
  padding:13px;
  font-family:var(--font-b);
  font-size:13px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  margin-top:8px;
  transition:all 0.3s;
}

.login-btn:hover{background:var(--gold-d);}

.error-msg{
  background:rgba(239,83,80,0.1);
  border:1px solid rgba(239,83,80,0.3);
  color:#ef5350;
  padding:10px 14px;
  font-size:12px;
  margin-bottom:16px;
  display:none;
  text-align:center;
}

.back-link{
  text-align:center;
  margin-top:20px;
}

.back-link a{
  color:var(--gray);
  font-size:12px;
  text-decoration:none;
  transition:color 0.2s;
}

.back-link a:hover{color:var(--gold);}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <div class="logo-star">✦</div>
    <div class="logo-txt">AURA <span style="font-family:'Cormorant Garamond',serif;color:#c9a96e;font-style:italic;font-size:18px;">Events</span></div>
    <div class="logo-sub">Admin Portal</div>
  </div>

  <div class="login-title">Welcome Back</div>

  <div class="error-msg" id="errorMsg">❌ Invalid username or password!</div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
  </div>

  <button class="login-btn" onclick="login()">Login to Dashboard</button>

  <div class="back-link">
    <a href="index.html">← Back to Website</a>
  </div>
</div>

<script>
// Admin credentials
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'aura2024';

// Check already logged in
if(sessionStorage.getItem('aura-admin') === 'true'){
  window.location.href = 'admin.html';
}

document.getElementById('password').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') login();
});

document.getElementById('username').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') login();
});

function login(){
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  const err = document.getElementById('errorMsg');

  if(user === ADMIN_USER && pass === ADMIN_PASS){
    sessionStorage.setItem('aura-admin', 'true');
    window.location.href = 'admin.html';
  } else {
    err.style.display = 'block';
    setTimeout(()=> err.style.display = 'none', 3000);
  }
}
</script>
</body>
</html>
